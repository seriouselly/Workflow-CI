name: Workflow CI MLflow

on:
  push:
    branches:
      - main # Robot akan bekerja setiap kali ada perubahan di branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn dagshub cloudpickle

      - name: Clean previous MLflow runs
        run: |
          cd MLProject
          rm -rf mlruns/ .mlflow/ || true
          echo "Cleaned old MLflow artifacts"
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Run MLflow Project
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          echo "Starting MLflow training..."
          mlflow run . --env-manager=local
          echo "MLflow training completed"

      - name: Dapatkan ID Eksperimen (Run ID) Terbaru
        id: get_run_id
        run: |
          cd MLProject
          echo "Checking for mlruns/0 directory..."
          if [ ! -d "mlruns/0" ]; then
            echo "ERROR: mlruns/0 directory not found!"
            echo "Available structure:"
            find . -maxdepth 3 -type d -name "mlruns*" -o -type d -name "0" | head -20
            exit 1
          fi

          echo "Contents of mlruns/0:"
          ls -la mlruns/0/

          RUN_ID=$(find mlruns/0 -maxdepth 1 -type d -not -name '0' | sort -r | head -1 | xargs -r basename)
          if [ -z "$RUN_ID" ]; then
            echo "Error: No MLflow run found in mlruns/0"
            exit 1
          fi

          echo "Found RUN_ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Verify Artifact Exists
        run: |
          cd MLProject
          echo "Checking MLflow runs directory..."
          ls -la mlruns/0/
          if [ -d "mlruns/0/${{ env.RUN_ID }}/artifacts" ]; then
            echo "✓ Artifacts found"
            ls -la "mlruns/0/${{ env.RUN_ID }}/artifacts/"
            echo "\n--- Contents of model directory ---"
            find "mlruns/0/${{ env.RUN_ID }}/artifacts/model" -type f | head -20 || echo "Model directory may not exist yet"
          else
            echo "✗ Artifacts directory not found"
            exit 1
          fi

      - name: Upload Artefak Model ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/mlruns/

      # TODO: Docker build diaktifkan setelah model training stabil
      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build dan Push Docker Image
        env:
          MLFLOW_DOCKER_ENV_MANAGER: local
          PYTHON_VERSION: "3.12"
        run: |
          cd MLProject
          echo "=== Build Docker Image ==="
          echo "RUN_ID: ${{ env.RUN_ID }}"
          echo "Model path: mlruns/0/${{ env.RUN_ID }}/artifacts/model"
          echo "Python Version: $PYTHON_VERSION"

          # Debug: Check if model exists
          if [ ! -d "mlruns/0/${{ env.RUN_ID }}/artifacts/model" ]; then
            echo "ERROR: Model directory not found!"
            echo "Available directories:"
            ls -la "mlruns/0/${{ env.RUN_ID }}/artifacts/"
            exit 1
          fi

          # Check conda.yaml for Python version
          echo "=== Checking conda.yaml ==="
          cat conda.yaml

          echo "=== Starting Docker build ==="
          mlflow models build-docker -m mlruns/0/${{ env.RUN_ID }}/artifacts/model -n prediksi-nilai-siswa:latest --enable-mlserver || {
            echo "Docker build failed, checking Dockerfile..."
            if [ -f Dockerfile ]; then
              echo "=== Generated Dockerfile ===" 
              head -30 Dockerfile
            fi
            exit 1
          }

          docker tag prediksi-nilai-siswa:latest ${{ secrets.DOCKER_USERNAME }}/prediksi-nilai-siswa:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/prediksi-nilai-siswa:latest
