name: Workflow CI MLflow

on:
  push:
    branches:
      - main # Robot akan bekerja setiap kali ada perubahan di branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn dagshub

      - name: Run MLflow Project
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Dapatkan ID Eksperimen (Run ID) Terbaru
        id: get_run_id
        run: |
          cd MLProject
          RUN_ID=$(find mlruns/0 -maxdepth 1 -type d -not -name '0' | sort -r | head -1 | xargs basename)
          if [ -z "$RUN_ID" ]; then
            echo "Error: No MLflow run found"
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Verify Artifact Exists
        run: |
          cd MLProject
          echo "Checking MLflow runs directory..."
          ls -la mlruns/0/
          if [ -d "mlruns/0/${{ env.RUN_ID }}/artifacts/model" ]; then
            echo "Model artifacts found"
            ls -la "mlruns/0/${{ env.RUN_ID }}/artifacts/model/"
          else
            echo "Model artifacts directory not found"
            echo "Available artifacts:"
            find mlruns/0/${{ env.RUN_ID }}/artifacts -type f 2>/dev/null || echo "No artifacts found"
            exit 1
          fi

      - name: Upload Artefak Model ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/mlruns/

      - name: Build dan Push Docker Image
        continue-on-error: true
        run: |
          cd MLProject

          # Get absolute path to model artifacts
          ABSOLUTE_MODEL_PATH="$(pwd)/mlruns/0/${{ env.RUN_ID }}/artifacts/model"
          echo "Model path: $ABSOLUTE_MODEL_PATH"

          # Verify model directory exists
          if [ ! -d "$ABSOLUTE_MODEL_PATH" ]; then
            echo "Error: Model directory not found at $ABSOLUTE_MODEL_PATH"
            ls -la "mlruns/0/${{ env.RUN_ID }}/artifacts/" || echo "Artifacts dir not found"
            exit 1
          fi

          # Build Docker image menggunakan file URI
          mlflow models build-docker \
            -m "file://$ABSOLUTE_MODEL_PATH" \
            -n prediksi-nilai-siswa:latest

          echo "✓ Docker image built successfully"
            docker tag prediksi-nilai-siswa:latest ${{ secrets.DOCKER_USERNAME }}/prediksi-nilai-siswa:latest
            docker push ${{ secrets.DOCKER_USERNAME }}/prediksi-nilai-siswa:latest
            echo "✓ Docker image pushed successfully"
          else
            echo "⚠ Docker Hub credentials not set, skipping push"
          fi
